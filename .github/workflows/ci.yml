name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  release:
    types: [published]

env:
  NODE_VERSION: '20'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ============================================
  # Job 1: Code Quality & Linting
  # ============================================
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/china-landing-ai-helper/pwa/package-lock.json

      - name: Install dependencies
        working-directory: products/china-landing-ai-helper/pwa
        run: npm ci

      - name: Run ESLint
        working-directory: products/china-landing-ai-helper/pwa
        run: npm run lint

  # ============================================
  # Job 2: Unit Tests with Coverage
  # ============================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/china-landing-ai-helper/pwa/package-lock.json

      - name: Install dependencies
        working-directory: products/china-landing-ai-helper/pwa
        run: npm ci

      - name: Run tests with coverage
        working-directory: products/china-landing-ai-helper/pwa
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: products/china-landing-ai-helper/pwa/coverage/
          retention-days: 7

      - name: Check coverage threshold (>80%)
        working-directory: products/china-landing-ai-helper/pwa
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets 80% threshold"

  # ============================================
  # Job 3: Build Verification
  # ============================================
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/china-landing-ai-helper/pwa/package-lock.json

      - name: Install dependencies
        working-directory: products/china-landing-ai-helper/pwa
        run: npm ci

      - name: Build application
        working-directory: products/china-landing-ai-helper/pwa
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: products/china-landing-ai-helper/pwa/.next/
          retention-days: 3

  # ============================================
  # Job 4: Lighthouse Performance (>90)
  # ============================================
  lighthouse:
    name: 💡 Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/china-landing-ai-helper/pwa/package-lock.json

      - name: Install dependencies
        working-directory: products/china-landing-ai-helper/pwa
        run: npm ci

      - name: Build for production
        working-directory: products/china-landing-ai-helper/pwa
        run: npm run build

      - name: Run Lighthouse audit
        working-directory: products/china-landing-ai-helper/pwa
        run: |
          npm install -g lighthouse
          # Start server in background
          npm run start &
          sleep 5
          # Run Lighthouse
          lighthouse http://localhost:3000 \
            --output=json \
            --output-path=./lighthouse-report.json \
            --quiet
          # Check scores
          PERFORMANCE=$(cat lighthouse-report.json | jq '.categories.performance.score * 100')
          echo "Performance Score: ${PERFORMANCE}"
          if (( $(echo "$PERFORMANCE < 90" | bc -l) )); then
            echo "❌ Performance score ${PERFORMANCE} is below 90 threshold"
            exit 1
          fi
          echo "✅ Performance score ${PERFORMANCE} meets 90 threshold"

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: products/china-landing-ai-helper/pwa/lighthouse-report.json
          retention-days: 7

  # ============================================
  # Job 5: Security Scan (No High Vulnerabilities)
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/china-landing-ai-helper/pwa/package-lock.json

      - name: Install dependencies
        working-directory: products/china-landing-ai-helper/pwa
        run: npm ci

      - name: Run npm audit
        working-directory: products/china-landing-ai-helper/pwa
        run: npm audit --audit-level=high

      - name: Run npm audit (JSON output)
        working-directory: products/china-landing-ai-helper/pwa
        run: npm audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: products/china-landing-ai-helper/pwa/audit-report.json
          retention-days: 7

  # ============================================
  # Job 6: Deploy to Preview (PR only)
  # ============================================
  deploy-preview:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/china-landing-ai-helper/pwa/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        working-directory: products/china-landing-ai-helper/pwa
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        working-directory: products/china-landing-ai-helper/pwa
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Preview
        id: deploy
        working-directory: products/china-landing-ai-helper/pwa
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_OUTPUT" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_OUTPUT"

  # ============================================
  # Job 7: Deploy to Production (Release only)
  # ============================================
  deploy-production:
    name: 🌐 Deploy Production
    runs-on: ubuntu-latest
    needs: [lint, test, build, lighthouse, security]
    if: github.event_name == 'release'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/china-landing-ai-helper/pwa/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        working-directory: products/china-landing-ai-helper/pwa
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        working-directory: products/china-landing-ai-helper/pwa
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        id: deploy
        working-directory: products/china-landing-ai-helper/pwa
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_OUTPUT" >> $GITHUB_OUTPUT
          echo "✅ Production deployed to: $DEPLOY_OUTPUT"

  # ============================================
  # Job 8: Quality Gate Summary
  # ============================================
  quality-gate:
    name: ✅ Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build, security]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "## Quality Gate Results"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Tests: ${{ needs.test.result }}"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Security: ${{ needs.security.result }}"
          
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ]; then
            echo "❌ Quality gate FAILED"
            exit 1
          fi
          echo "✅ All quality gates PASSED"
